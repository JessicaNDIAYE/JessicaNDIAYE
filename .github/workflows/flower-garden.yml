name: 🌸 Generate Flower Contribution Garden

on:
  schedule:
    - cron: "0 0 * * *"    # tous les jours à minuit
  workflow_dispatch:         # déclenchement manuel
  push:
    branches:
      - main

jobs:
  generate-garden:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🌸 Generate flower garden SVG
        run: python generate_garden.py ${{ secrets.GH_TOKEN }}
        working-directory: .github/scripts

      - name: 🚀 Commit and push SVG
        run: |
          git config user.name "JessicaNDIAYE"
          git config user.email "ndiajessi13@gmail.com"
          mkdir -p dist
          cp .github/scripts/contribution-garden.svg dist/contribution-garden.svg
          git add dist/contribution-garden.svg
          git diff --staged --quiet || git commit -m "🌸 Update flower contribution garden"
          git push
